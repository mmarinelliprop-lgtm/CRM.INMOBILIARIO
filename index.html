<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Solumitos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#14161f; --card:#1e2130; --card-2:#262a3d; --text:#f2f2fa; --muted:#8b8fa8; --line:#2d3146;
    --lila:#9b7ede; --magenta:#e0447e; --azul:#3aa0e8; --verde:#2fd6b8; --naranja:#ffa53e;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; padding-bottom:74px; }
  header { padding:16px 18px 8px; display:flex; justify-content:space-between; align-items:center; }
  .who { display:flex; align-items:center; gap:10px; }
  .avatar-bot { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg, var(--azul), var(--magenta)); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .who-text .hi { font-size:11px; color:var(--muted); }
  .who-text .name { font-size:14.5px; font-weight:800; }
  .motivacional { font-size:10.5px; color:var(--naranja); font-weight:700; margin-top:2px; max-width:200px; line-height:1.3; }
  .titulo { font-size:15px; font-weight:800; }
  .header-btns { display:flex; gap:6px; }
  .header-btn { font-size:10px; font-weight:700; background:var(--card); border:1px solid var(--line); color:var(--text); border-radius:20px; padding:6px 9px; cursor:pointer; white-space:nowrap; }
  main { padding:0 18px; }
  .view { display:none; }
  .view.active { display:block; }
  .loading { color:var(--muted); font-size:12.5px; text-align:center; padding:14px 0; }

  /* AGENDA */
  .cal-header { display:flex; align-items:center; justify-content:space-between; padding:6px 0 10px; }
  .cal-day { font-size:12.5px; color:var(--muted); }
  .cal-num { font-size:24px; font-weight:800; }
  .cal-nav { display:flex; gap:14px; color:var(--muted); font-size:18px; }
  .cal-mes { font-size:12.5px; color:var(--muted); font-weight:700; }
  .modo-cal-toggle { display:flex; background:var(--card); border-radius:14px; padding:4px; margin-bottom:12px; }
  .modo-cal-btn { flex:1; text-align:center; padding:8px 0; font-size:12px; font-weight:700; color:var(--muted); border-radius:10px; cursor:pointer; }
  .modo-cal-btn.active { background:var(--verde); color:#062b23; }
  .cal-grid { position:relative; border-top:1px solid var(--line); }
  .cal-hour-row { height:54px; display:flex; border-bottom:1px solid var(--line); }
  .cal-hour-lbl { width:42px; font-size:10px; color:var(--muted); padding-top:4px; flex-shrink:0; }
  .cal-hour-line { flex:1; }
  .cal-events-layer { position:absolute; top:0; left:46px; right:0; bottom:0; }
  .cal-event { position:absolute; left:2px; right:2px; border-radius:8px; padding:5px 8px; font-size:11px; font-weight:700; overflow:hidden; cursor:pointer; }
  .cal-event .sub { font-size:9px; font-weight:500; opacity:.85; margin-top:1px; }
  .ev-lila{background:var(--lila);color:#1c0f33} .ev-magenta{background:var(--magenta);color:#2c0518}
  .ev-azul{background:var(--azul);color:#041a2c} .ev-verde{background:var(--verde);color:#06281c} .ev-naranja{background:var(--naranja);color:#2c1600}
  .completada { opacity:.4; text-decoration:line-through; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(10,11,25,.75); display:none; align-items:flex-end; z-index:70; }
  .modal-overlay.active { display:flex; }
  .modal-box { background:var(--card); width:100%; border-radius:22px 22px 0 0; padding:20px 18px 26px; max-height:85vh; overflow-y:auto; }
  .modal-title { font-size:15px; font-weight:800; margin-bottom:4px; }
  .modal-sub { font-size:12px; color:var(--muted); margin-bottom:14px; }
  .opcion-btn { width:100%; text-align:left; background:var(--card-2); border:1px solid var(--line); color:var(--text); border-radius:14px; padding:13px 14px; margin-bottom:9px; font-size:13.5px; font-weight:600; cursor:pointer; }
  .opcion-btn.manual { border-style:dashed; color:var(--muted); }
  .opcion-btn .flecha { float:right; color:var(--muted); }
  .modal-cancelar { width:100%; text-align:center; padding:12px; color:var(--muted); font-size:13px; margin-top:4px; cursor:pointer; }
  textarea.pega, input.q, .modal-box input[type=datetime-local] { width:100%; background:var(--card-2); border:1px solid var(--line); border-radius:12px; color:var(--text); padding:11px 12px; font-size:13px; font-family:'Manrope',sans-serif; margin-bottom:12px; }
  label.q { display:block; font-size:11px; color:var(--muted); font-weight:700; margin:10px 0 5px; }
  .link-chip { display:flex; align-items:center; gap:8px; background:var(--card-2); border-radius:10px; padding:9px 10px; margin-bottom:8px; font-size:12px; }
  .link-chip .url { flex:1; word-break:break-all; color:var(--verde); }
  .btn-detectar,.btn-continuar { width:100%; border:none; border-radius:12px; padding:12px; font-size:13px; font-weight:700; cursor:pointer; margin-bottom:12px; }
  .btn-detectar { background:var(--card-2); color:var(--text); border:1px solid var(--line); }
  .btn-continuar { background:var(--verde); color:#062b23; font-weight:800; }

  /* CLIENTES */
  .top-toggle { display:flex; background:var(--card); border-radius:14px; padding:4px; margin:14px 0 12px; }
  .top-toggle-btn { flex:1; text-align:center; padding:10px 0; font-size:13px; font-weight:700; color:var(--muted); border-radius:10px; cursor:pointer; }
  .top-toggle-btn.active { background:var(--verde); color:#062b23; }
  .funnel-label { font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin:16px 2px 8px; }
  .grupo { border-radius:14px; margin-bottom:8px; overflow:hidden; }
  .grupo-head { display:flex; align-items:center; justify-content:space-between; padding:13px 14px; cursor:pointer; font-weight:800; font-size:13.5px; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.25); }
  .grupo-head .chev { transition:transform .15s; }
  .grupo.abierto .grupo-head .chev { transform:rotate(180deg); }
  .grupo-body { display:none; background:var(--card); padding:4px 10px 8px; }
  .grupo.abierto .grupo-body { display:block; }
  .cliente-row { display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--line); cursor:pointer; }
  .cliente-row:last-child { border-bottom:none; }
  .cliente-nombre { font-size:13.5px; font-weight:700; }
  .cliente-tarea { font-size:11px; color:var(--muted); margin-top:1px; }
  .cliente-actions { display:flex; gap:6px; flex-shrink:0; }
  .icon-btn { width:30px; height:30px; border-radius:50%; background:var(--card-2); display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; border:none; }
  .buscador-row { display:flex; gap:8px; margin-bottom:10px; }
  input.buscador { flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; color:var(--text); padding:12px 13px; font-size:13.5px; font-family:'Manrope',sans-serif; }
  .tags-filtro { display:flex; gap:7px; overflow-x:auto; margin-bottom:12px; }
  .tag-filtro { font-size:11px; padding:7px 12px; border-radius:20px; background:var(--card); color:var(--muted); white-space:nowrap; cursor:pointer; border:1px solid var(--line); }
  .tag-filtro.active { background:var(--verde); color:#062b23; font-weight:700; }
  .potencial-card { background:var(--card); border-radius:16px; padding:13px 14px; margin-bottom:9px; }
  .ptag { font-size:9.5px; font-weight:800; padding:4px 9px; border-radius:8px; background:var(--card-2); color:var(--muted); margin-right:5px; }
  .btn-chico { font-size:10.5px; font-weight:800; padding:7px 11px; border-radius:10px; border:none; cursor:pointer; margin-right:6px; }

  /* CARGA */
  .chat-wrap { display:flex; flex-direction:column; height:calc(100vh - 160px); padding-top:10px; }
  .chat-msgs { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding-bottom:10px; }
  .msg { max-width:80%; padding:11px 14px; border-radius:16px; font-size:13.5px; line-height:1.4; }
  .msg-bot { background:var(--card); align-self:flex-start; border-bottom-left-radius:4px; }
  .msg-user { background:var(--verde); color:#062b23; align-self:flex-end; border-bottom-right-radius:4px; font-weight:600; }
  .quick-replies { display:flex; flex-wrap:wrap; gap:8px; align-self:flex-start; max-width:90%; }
  .quick-reply { background:var(--card-2); border:1px solid var(--line); color:var(--text); border-radius:20px; padding:8px 13px; font-size:12.5px; font-weight:600; cursor:pointer; }
  .chat-input-row { display:flex; gap:8px; align-items:center; padding:10px 0 4px; border-top:1px solid var(--line); }
  .chat-text-input { flex:1; background:var(--card); border:1px solid var(--line); border-radius:20px; padding:11px 15px; color:var(--text); font-size:13.5px; font-family:'Manrope',sans-serif; }
  .chat-send { width:40px; height:40px; border-radius:50%; background:var(--verde); border:none; color:#062b23; font-size:16px; cursor:pointer; }

  /* METAS */
  .card { background:var(--card); border-radius:20px; padding:16px; margin-bottom:12px; margin-top:14px; }
  .card-title { font-size:12.5px; font-weight:700; color:var(--muted); margin-bottom:10px; }
  .bar-row .lbl-row { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px; }
  .bar-track { height:8px; background:var(--card-2); border-radius:6px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:6px; }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; display:flex; background:var(--card); border-top:1px solid var(--line); z-index:10; padding:7px 0 5px; }
  .nav-item { flex:1; text-align:center; font-size:10px; color:var(--muted); font-weight:700; padding:6px 0; cursor:pointer; }
  .nav-item.active { color:var(--verde); }
  .nav-icon { font-size:18px; display:block; margin-bottom:3px; }

  .banner-error { background:#3a1f22; color:#ff9b9b; font-size:12px; padding:10px 14px; border-radius:12px; margin:10px 0; display:none; }
</style>
</head>
<body>

<header>
  <div class="who">
    <div class="avatar-bot">🤖</div>
    <div class="who-text">
      <div class="hi">Hola de nuevo</div>
      <div class="name">Martu</div>
      <div class="motivacional" id="frase-motivacional"></div>
    </div>
  </div>
  <div class="header-btns" id="header-btns"></div>
</header>

<main>
  <div class="banner-error" id="banner-error"></div>

  <!-- AGENDA -->
  <div id="view-agenda" class="view active">
    <div class="cal-header">
      <div><div class="cal-day" id="cal-day-lbl"></div><div class="cal-num" id="cal-num-lbl"></div></div>
      <div class="cal-mes" id="cal-mes-lbl"></div>
      <div class="cal-nav"><span onclick="navegar(-1)">‹</span><span onclick="navegar(1)">›</span></div>
    </div>
    <div class="modo-cal-toggle">
      <div class="modo-cal-btn active" data-modo="dia" onclick="cambiarModoCal('dia')">Día</div>
      <div class="modo-cal-btn" data-modo="semana" onclick="cambiarModoCal('semana')">Semana</div>
      <div class="modo-cal-btn" data-modo="mes" onclick="cambiarModoCal('mes')">Mes</div>
    </div>
    <div id="cal-grid" class="cal-grid"><div class="loading">Cargando agenda…</div></div>
  </div>

  <!-- CLIENTES -->
  <div id="view-clientes" class="view">
    <div class="top-toggle">
      <div class="top-toggle-btn active" onclick="cambiarBloqueClientes('activos', event)">Activos</div>
      <div class="top-toggle-btn" onclick="cambiarBloqueClientes('potenciales', event)">Potenciales</div>
    </div>
    <div id="bloque-activos">
      <div class="buscador-row"><input class="buscador" placeholder="Buscar cliente o etapa..." oninput="cargarActivos(this.value)"></div>
      <div id="grupos-activos"><div class="loading">Cargando…</div></div>
    </div>
    <div id="bloque-potenciales" style="display:none">
      <div class="buscador-row"><input class="buscador" placeholder="Buscar por nombre..." oninput="cargarPotenciales()"></div>
      <div class="tags-filtro" id="tags-filtro"></div>
      <div id="lista-potenciales"><div class="loading">Cargando…</div></div>
    </div>
  </div>

  <!-- CARGA -->
  <div id="view-carga" class="view">
    <div class="chat-wrap">
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-row">
        <input class="chat-text-input" id="chat-input" placeholder="Escribí acá..." onkeydown="if(event.key==='Enter')enviarChat()">
        <button class="chat-send" onclick="enviarChat()">➤</button>
      </div>
    </div>
  </div>

  <!-- METAS -->
  <div id="view-metas" class="view"><div id="metas-contenido"><div class="loading">Cargando…</div></div></div>
</main>

<div class="bottom-nav">
  <div class="nav-item active" data-view="agenda" onclick="mostrar('agenda')"><span class="nav-icon">📅</span>Agenda</div>
  <div class="nav-item" data-view="clientes" onclick="mostrar('clientes')"><span class="nav-icon">👥</span>Clientes</div>
  <div class="nav-item" data-view="carga" onclick="mostrar('carga')"><span class="nav-icon">💬</span>Carga</div>
  <div class="nav-item" data-view="metas" onclick="mostrar('metas')"><span class="nav-icon">◈</span>Metas</div>
</div>

<div class="modal-overlay" id="modal-overlay"><div class="modal-box" id="modal-box"></div></div>

<script>
// ================= CONEXIÓN CON LA API (Apps Script) =================
// Pegá acá la URL de tu Web App de Apps Script (Implementar → Nueva implementación → Aplicación web).
// Termina en /exec
const APP_URL = 'https://script.google.com/macros/s/AKfycbyna3N9W9p23qKPBF3A_sp6q9VlkkYWcb7qrT4pAbYkZyXuN9M_jE1vYYRjoeFriX4/exec';

let _jsonpContador = 0;
function apiCall(action, params) {
  return new Promise(function(resolve, reject) {
    const cbNombre = '_crmCallback' + (_jsonpContador++);
    const url = new URL(APP_URL);
    url.searchParams.set('action', action);
    Object.keys(params || {}).forEach(function(k) {
      const v = params[k];
      if (v === null || v === undefined || v === '') return;
      url.searchParams.set(k, typeof v === 'object' ? JSON.stringify(v) : v);
    });
    url.searchParams.set('callback', cbNombre);

    const script = document.createElement('script');
    const limpiar = function() { delete window[cbNombre]; script.remove(); };

    window[cbNombre] = function(data) {
      limpiar();
      if (data && data.error) reject(new Error(data.error));
      else resolve(data);
    };
    script.onerror = function() { limpiar(); reject(new Error('No se pudo conectar con la API.')); };
    script.src = url.toString();
    document.body.appendChild(script);
  });
}

// ================= NAV =================
const cacheVistas = { agenda: null, activos: null, potenciales: null, metas: null };

function mostrar(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelector('.nav-item[data-view="' + v + '"]').classList.add('active');
  pintarHeaderBtns(v);
  if (v === 'agenda') { if (cacheVistas.agenda) renderizarDia(cacheVistas.agenda); pintarVistaActual(); }
  if (v === 'clientes') { if (cacheVistas.activos) renderizarActivos(cacheVistas.activos); cargarActivos(''); }
  if (v === 'carga') iniciarChat();
  if (v === 'metas') { if (cacheVistas.metas) renderizarMetas(cacheVistas.metas); cargarMetas(); }
}
function pintarHeaderBtns(v) {
  const cont = document.getElementById('header-btns');
  cont.innerHTML = v === 'agenda' ? `<button class="header-btn" onclick="abrirQuiz()">🎯 Prefs</button><button class="header-btn" onclick="abrirTareaManual()">✎ Nueva</button>` : '';
}
function cerrarModal() { document.getElementById('modal-overlay').classList.remove('active'); }
function mostrarError(err) {
  console.error(err);
  const b = document.getElementById('banner-error');
  b.style.display = 'block';
  b.innerText = 'Error: ' + (err.message || err);
  setTimeout(() => { b.style.display = 'none'; }, 6000);
}

// ================= AGENDA =================
let diaMostrado = new Date();
let modoCal = 'dia';
const HORAS = []; for (let h = 8; h <= 23; h++) HORAS.push(h);

function pintarVistaActual() { if (modoCal === 'dia') pintarDia(); }
function cambiarModoCal(m) {
  modoCal = m;
  document.querySelectorAll('.modo-cal-btn').forEach(b => b.classList.toggle('active', b.dataset.modo === m));
  pintarVistaActual();
}
function navegar(delta) {
  diaMostrado.setDate(diaMostrado.getDate() + delta);
  pintarVistaActual();
}
function pintarDia() {
  document.getElementById('cal-day-lbl').innerText = diaMostrado.toLocaleDateString('es-AR', { weekday: 'short' }).toUpperCase();
  document.getElementById('cal-num-lbl').innerText = diaMostrado.getDate();
  document.getElementById('cal-mes-lbl').innerText = diaMostrado.toLocaleDateString('es-AR', { month: 'long' });
  if (!cacheVistas.agenda) document.getElementById('cal-grid').innerHTML = '<div class="loading">Cargando…</div>';
  apiCall('getEventosDia', { fecha: diaMostrado.toISOString() })
    .then(function(eventos) { cacheVistas.agenda = eventos; renderizarDia(eventos); })
    .catch(mostrarError);
}
function renderizarDia(eventos) {
  let filas = '';
  HORAS.forEach(h => filas += `<div class="cal-hour-row"><div class="cal-hour-lbl">${String(h).padStart(2,'0')}:00</div><div class="cal-hour-line"></div></div>`);
  const alturaHora = 54;
  const html = eventos.map(ev => {
    const inicio = new Date(ev.inicioISO), fin = new Date(ev.finISO);
    const inicioH = inicio.getHours() + inicio.getMinutes() / 60, finH = fin.getHours() + fin.getMinutes() / 60;
    const top = (inicioH - 8) * alturaHora, height = Math.max((finH - inicioH) * alturaHora - 3, 20);
    return `<div class="cal-event ev-${ev.clase} ${ev.completada ? 'completada' : ''}" style="top:${top}px;height:${height}px" onclick="${ev.esCRM ? "marcarHecho('" + ev.id + "')" : "alert('Evento personal.')"}">${ev.completada ? '✓ ' : ''}${ev.titulo}<div class="sub">${ev.cliente}</div></div>`;
  }).join('');
  document.getElementById('cal-grid').innerHTML = filas + `<div class="cal-events-layer">${html}</div>`;
}

// ---- Tarea manual ----
function toDatetimeLocal(d) { const p = n => String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }
function abrirTareaManual() {
  const def = new Date(diaMostrado); def.setHours(10,0,0,0);
  document.getElementById('modal-box').innerHTML = `
    <div class="modal-title">Nueva tarea manual</div>
    <label class="q">Descripción</label><input class="q" id="man-desc" placeholder="Ej: Llamar a la inmobiliaria vecina">
    <label class="q">Cliente (opcional)</label><input class="q" id="man-cliente" placeholder="Ej: Julián Torres">
    <label class="q">Día y horario</label><input type="datetime-local" id="man-fecha" value="${toDatetimeLocal(def)}">
    <label class="q">¿En qué calendario va?</label>
    <select class="q" id="man-categoria" onchange="onCambioCategoriaManual()">
      <option value="reuniones">Reuniones</option>
      <option value="captacion">Captación</option>
      <option value="muestra">Muestra</option>
      <option value="oficina">Oficina</option>
    </select>
    <div id="man-persona-wrap" style="display:none">
      <label class="q">¿Quién la hace?</label>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="opcion-btn" id="persona-jose" style="flex:1;text-align:center" onclick="elegirPersona('Jose')">José</button>
        <button class="opcion-btn" id="persona-martu" style="flex:1;text-align:center" onclick="elegirPersona('Martu')">Vos (Martu)</button>
      </div>
    </div>
    <button class="btn-continuar" onclick="guardarTareaManual()">Agendar</button>
    <div class="modal-cancelar" onclick="cerrarModal()">Cancelar</div>`;
  document.getElementById('modal-overlay').classList.add('active');
  window._personaElegida = null;
}
function onCambioCategoriaManual() {
  const cat = document.getElementById('man-categoria').value;
  document.getElementById('man-persona-wrap').style.display = (cat === 'muestra' || cat === 'oficina') ? 'block' : 'none';
}
function guardarTareaManual() {
  const desc = document.getElementById('man-desc').value.trim();
  const cliente = document.getElementById('man-cliente').value.trim();
  const fecha = document.getElementById('man-fecha').value;
  const categoria = document.getElementById('man-categoria').value;
  if (!desc || !fecha) return;
  if ((categoria === 'muestra' || categoria === 'oficina') && !window._personaElegida) { alert('Elegí primero quién la hace.'); return; }
  apiCall('crearTareaManual', { descripcion: desc, cliente: cliente, fecha: new Date(fecha).toISOString(), categoria: categoria, persona: window._personaElegida })
    .then(() => { cerrarModal(); pintarVistaActual(); }).catch(mostrarError);
}

// ---- Quiz de preferencias ----
const PREGUNTAS_QUIZ = [
  'Rango horario preferido para trabajar la mayoría de los días',
  '¿Horario bloqueado todos los días (almuerzo, etc.)?',
  '¿Qué días de la semana trabajás?',
  '¿Tenés bloques horarios establecidos para hacer llamados?',

let eventoActivoId = null;
function marcarHecho(id) {
  eventoActivoId = id;
  apiCall('iniciarCompletarTarea', { eventId: id }).then(manejarResultado).catch(mostrarError);
}
function manejarResultado(r) {
  if (r.tipo === 'ya_completada') { alert('Esta tarea ya está completada.'); return; }
  if (r.tipo === 'completada_simple' || r.tipo === 'terminal' || r.tipo === 'ok_simple') { pintarVistaActual(); return; }
  if (r.tipo === 'links') { abrirPasoLinks(); return; }
  if (r.tipo === 'horario') { abrirPropuestaHorario(r); return; }
  if (r.tipo === 'horario_acm') { abrirPropuestaHorarioACM(r.fechaMin, r.personaSugerida); return; }
  if (r.tipo === 'horario_reserva') { abrirPropuestaHorarioReserva(r); return; }
  if (r.tipo === 'ramas') { abrirRamas(r.opciones); return; }
  if (r.tipo === 'consulta_manana') { abrirConsultaManana(); return; }
}

function abrirPasoLinks() {
  document.getElementById('modal-box').innerHTML = `
    <div class="modal-title">Registrar la búsqueda</div>
    <div class="modal-sub">Pegá los mensajes/links tal como los mandaste. Se separan solos.</div>
    <textarea class="pega" id="pega-texto" rows="5" placeholder="Ej: Mirá este! https://... y este https://..."></textarea>
    <button class="btn-detectar" onclick="detectarLinks()">🔍 Detectar links</button>
    <div id="links-detectados"></div>
    <button class="btn-continuar" onclick="confirmarLinks()">Continuar</button>
    <div class="modal-cancelar" onclick="cerrarModal()">Cancelar</div>`;
  document.getElementById('modal-overlay').classList.add('active');

}
function detectarLinks() {
  const t = document.getElementById('pega-texto').value;
  (t.match(/https?:\/\/[^\s)]+/g) || []).forEach(u => { if (!window._links.includes(u)) window._links.push(u); });
  document.getElementById('links-detectados').innerHTML = window._links.map((u,i) => `<div class="link-chip"><span class="url">${u}</span></div>`).join('') || '<div class="loading">Sin links detectados.</div>';

// ================= CARGA (chat) =================
const chatState = { paso: 'inicio', datos: {} };
function chatMsgs() { return document.getElementById('chat-msgs'); }
function addBotMsg(t) { const d=document.createElement('div'); d.className='msg msg-bot'; d.innerText=t; chatMsgs().appendChild(d); chatMsgs().scrollTop=chatMsgs().scrollHeight; }
function addUserMsg(t) { const d=document.createElement('div'); d.className='msg msg-user'; d.innerText=t; chatMsgs().appendChild(d); chatMsgs().scrollTop=chatMsgs().scrollHeight; }
function addQuickReplies(ops) {
  const wrap=document.createElement('div'); wrap.className='quick-replies';
  ops.forEach(op => { const b=document.createElement('div'); b.className='quick-reply'; b.innerText=op; b.onclick=()=>{addUserMsg(op);wrap.remove();procesarChat(op);}; wrap.appendChild(b); });
  chatMsgs().appendChild(wrap); chatMsgs().scrollTop=chatMsgs().scrollHeight;
}
function iniciarChat() {
  chatMsgs().innerHTML = ''; chatState.paso='inicio'; chatState.datos={};
  addBotMsg('Hola 👋 Contame de quién se trata.');
}
function enviarChat() {
  const input = document.getElementById('chat-input'); const t = input.value.trim();
  if (!t) return; addUserMsg(t); input.value=''; procesarChat(t);
}
function procesarChat(texto) {
  setTimeout(() => {
    if (chatState.paso === 'inicio') {
      chatState.datos.NOMBRE = texto; addBotMsg('¿Cuál es el teléfono?'); chatState.paso='telefono';
    } else if (chatState.paso === 'telefono') {
      chatState.datos.TELEFONO = texto;
      apiCall('chequearDuplicado', { nombre: chatState.datos.NOMBRE, telefono: texto }).then(function(res) {
        if (res.duplicado) { addBotMsg('⚠️ Ya existe: ' + res.nombre + ' (' + res.etapa + '). ¿Seguimos?'); addQuickReplies(['Seguir igual','Cancelar']); chatState.paso='dupconfirm'; }
        else { addBotMsg('Perfecto, ¿alguna observación?'); chatState.paso='obs'; }
      }).catch(mostrarError);
    } else if (chatState.paso === 'dupconfirm') {
      if (texto.indexOf('Seguir')!==-1) { addBotMsg('Perfecto, ¿alguna observación?'); chatState.paso='obs'; }
      else { addBotMsg('Cancelado.'); chatState.paso='inicio'; chatState.datos={}; }
    } else if (chatState.paso === 'obs') {
      chatState.datos.OBSERVACION = texto;
      addBotMsg('Guardo y armo la primera tarea. ¿Confirmás?'); addQuickReplies(['Sí, guardar','Cancelar']); chatState.paso='confirmar';
    } else if (chatState.paso === 'confirmar') {
      if (texto.indexOf('Sí')!==-1 || texto.indexOf('Si')!==-1) {
        apiCall('agregarConsultaRapida', { datos: chatState.datos }).then(function() {
          addBotMsg('✅ Guardado. Tarea creada en tu agenda.');
          setTimeout(() => { addBotMsg('¿Cargamos otro?'); chatState.paso='inicio'; chatState.datos={}; }, 600);
        }).catch(mostrarError);
      } else { addBotMsg('Ok, no lo guardo.'); chatState.paso='inicio'; chatState.datos={}; }
    }
  }, 400);
}

// ================= METAS =================
function renderizarMetas(m) {
  document.getElementById('metas-contenido').innerHTML = `
    <div class="card"><div class="card-title">CAPTACIONES ESTE MES</div>
      <div class="bar-row"><div class="lbl-row"><span>${m.captacionesEsteMes} conseguidas</span><span>meta: ${m.metaCaptaciones}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,m.captacionesEsteMes/m.metaCaptaciones*100)}%;background:var(--verde)"></div></div></div></div>
    <div class="card"><div class="card-title">CIERRES ESTE MES</div>
      <div class="bar-row"><div class="lbl-row"><span>${m.cierresEsteMes} cerrados</span><span>meta: ${m.metaCierres}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,m.cierresEsteMes/m.metaCierres*100)}%;background:var(--magenta)"></div></div></div></div>`;
}
function cargarMetas() {
  apiCall('getMetas').then(function(m) { cacheVistas.metas = m; renderizarMetas(m); }).catch(mostrarError);
}

// ================= SALUDO Y FRASE MOTIVACIONAL =================
function pintarFraseMotivacional() {
  apiCall('getMetas').then(function(m) {
    cacheVistas.metas = m;
    const hoy = new Date();
    const diasMes = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).getDate();
    const progresoEsperado = hoy.getDate() / diasMes;
    const progresoReal = ((m.captacionesEsteMes / m.metaCaptaciones) + (m.cierresEsteMes / m.metaCierres)) / 2;
    const diff = progresoReal - progresoEsperado;
    let frase;
    if (diff < -0.2) frase = '⚠️ Vas atrasada con la meta del mes — hoy es día de moverte en serio.';
    else if (diff < -0.08) frase = 'Un poco atrasada con la meta. Metele con todo hoy.';
    else if (diff < 0.08) frase = 'Vas en ritmo con la meta del mes. Seguí así 💪';
    else if (diff < 0.2) frase = 'Vas arriba de la meta — buen ritmo este mes.';
    else frase = '🔥 Estás volando este mes, vas a superar la meta.';
    document.getElementById('frase-motivacional').innerText = frase;
  }).catch(function() { document.getElementById('frase-motivacional').innerText = ''; });
}

// ================= INIT =================
pintarHeaderBtns('agenda');
pintarFraseMotivacional();
pintarDia();
pintarTagsFiltro();
</script>
